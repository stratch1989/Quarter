<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quarter Premium</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0A0A0A;
            color: #FFFFFF;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #1C1C1E;
            border-radius: 20px;
            padding: 40px 32px;
            max-width: 380px;
            width: 90%;
            text-align: center;
        }
        .logo {
            font-size: 48px;
            margin-bottom: 16px;
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #888;
            font-size: 15px;
            margin-bottom: 32px;
        }
        .features {
            text-align: left;
            margin-bottom: 32px;
        }
        .feature {
            display: flex;
            align-items: center;
            padding: 10px 0;
            font-size: 15px;
            color: #CCC;
        }
        .feature .icon {
            margin-right: 12px;
            font-size: 20px;
        }
        .price {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .price-period {
            color: #888;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .pay-btn {
            display: block;
            width: 100%;
            padding: 16px;
            background: #FF9800;
            color: #000;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .pay-btn:hover { opacity: 0.85; }
        .pay-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .secure {
            color: #666;
            font-size: 12px;
            margin-top: 16px;
        }
        .error {
            color: #FF5252;
            font-size: 14px;
            margin-top: 12px;
            display: none;
        }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #000;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">💰</div>
        <h1>Quarter Premium</h1>
        <p class="subtitle">Расширенные возможности бюджетирования</p>

        <div class="features">
            <div class="feature"><span class="icon">☁️</span> Облачная синхронизация</div>
            <div class="feature"><span class="icon">📊</span> Расширенная аналитика</div>
            <div class="feature"><span class="icon">🔄</span> Автоматические подписки</div>
            <div class="feature"><span class="icon">📱</span> Несколько устройств</div>
        </div>

        <div class="price">199 ₽</div>
        <p class="price-period">в месяц</p>

        <button class="pay-btn" id="payBtn" onclick="startPayment()">
            Оплатить
        </button>

        <p class="error" id="errorMsg"></p>
        <p class="secure">🔒 Безопасная оплата через ЮKassa</p>
    </div>

    <script>
        // Получаем параметры из URL
        const params = new URLSearchParams(window.location.search);
        const uid = params.get('uid');
        const idToken = params.get('idToken');

        if (!uid || !idToken) {
            document.getElementById('errorMsg').textContent =
                'Ошибка: откройте эту страницу из приложения Quarter';
            document.getElementById('errorMsg').style.display = 'block';
            document.getElementById('payBtn').disabled = true;
        }

        async function startPayment() {
            const btn = document.getElementById('payBtn');
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.style.display = 'none';

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Создаём платёж...';

            try {
                const response = await fetch('/api/createPayment', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ uid, idToken })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Ошибка сервера');
                }

                // Перенаправляем на страницу оплаты ЮKassa
                if (data.confirmationUrl) {
                    window.location.href = data.confirmationUrl;
                } else {
                    throw new Error('Не удалось получить ссылку на оплату');
                }
            } catch (err) {
                errorMsg.textContent = err.message;
                errorMsg.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Оплатить';
            }
        }
    </script>
</body>
</html>
